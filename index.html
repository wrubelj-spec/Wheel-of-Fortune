<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8th Grade Science Wheel of Fortune</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f0f8ff;
    margin:20px;
}

h1{
    color:#0d47a1;
}

#wheel{
    width:250px;
    height:250px;
    border-radius:50%;
    border:8px solid #333;
    margin:20px auto;
    transition:transform 4s ease-out;
    background:
    conic-gradient(
        red 0deg 45deg,
        orange 45deg 90deg,
        yellow 90deg 135deg,
        green 135deg 180deg,
        blue 180deg 225deg,
        indigo 225deg 270deg,
        violet 270deg 315deg,
        pink 315deg 360deg
    );
}

.pointer{
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid black;
    margin:auto;
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

input{
    padding:10px;
    font-size:16px;
    width:60px;
    text-align:center;
}

select{
    padding:8px;
    font-size:16px;
}

#puzzle{
    font-size:36px;
    letter-spacing:8px;
    margin:20px;
    font-weight:bold;
}

#message{
    font-size:20px;
    color:green;
    margin:15px;
    min-height:30px;
}

#spinValue{
    color:#d32f2f;
}

#playerScores{
    margin:20px;
}

.scoreCard{
    margin:5px;
}

.current{
    color:#d32f2f;
    font-weight:bold;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<h1>🎡 8th Grade Science Wheel of Fortune</h1>

<div id="setupScreen">
    <h3>Select Number of Players</h3>

    <select id="playerCount">
        <option value="1">1 Player</option>
        <option value="2" selected>2 Players</option>
        <option value="3">3 Players</option>
        <option value="4">4 Players</option>
    </select>

    <br><br>

    <button onclick="setupPlayers()">Start Game</button>
</div>

<div id="gameArea" class="hidden">

    <h2 id="currentPlayer"></h2>

    <div id="playerScores"></div>

    <div class="pointer"></div>
    <div id="wheel"></div>

    <button onclick="spinWheel()">🎡 Spin Wheel</button>

    <h2 id="spinValue">Spin to Begin!</h2>

    <div id="puzzle"></div>

    <input type="text"
           id="guess"
           maxlength="1"
           placeholder="A">

    <button onclick="guessLetter()">Guess Letter</button>

    <div id="message"></div>

</div>

<script>

// Science Terms
const scienceWords = [
    "PHOTOSYNTHESIS",
    "ATOM",
    "MOLECULE",
    "ECOSYSTEM",
    "GRAVITY",
    "ENERGY",
    "CHEMICAL",
    "REACTION",
    "MITOSIS",
    "ADAPTATION",
    "EVOLUTION",
    "CELL",
    "NUCLEUS",
    "FORCE",
    "MASS",
    "DENSITY",
    "WEATHER",
    "CLIMATE",
    "FOSSIL",
    "GENETICS"
];

// Wheel Values
const wheelValues = [
    100,
    200,
    300,
    400,
    500,
    600,
    700,
    800
];

let currentWord = "";
let guessedLetters = [];
let currentSpin = 0;

let players = [];
let currentPlayerIndex = 0;

// Setup Players
function setupPlayers(){

    const count =
        parseInt(document.getElementById("playerCount").value);

    players = [];

    for(let i = 1; i <= count; i++){

        players.push({
            name: "Player " + i,
            score: 0
        });

    }

    currentPlayerIndex = 0;

    document.getElementById("setupScreen").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");

    updateScoreBoard();
    startGame();
}

// Start New Puzzle
function startGame(){

    currentWord =
        scienceWords[Math.floor(Math.random() * scienceWords.length)];

    guessedLetters = [];

    displayPuzzle();

    document.getElementById("message").innerHTML = "";
}

// Show Puzzle
function displayPuzzle(){

    let display = "";

    for(let letter of currentWord){

        if(guessedLetters.includes(letter)){
            display += letter + " ";
        }
        else{
            display += "_ ";
        }

    }

    document.getElementById("puzzle").innerHTML = display;

    // Puzzle solved?
    if(!display.includes("_")){

        let winner = players[0];

        players.forEach(player => {

            if(player.score > winner.score){
                winner = player;
            }

        });

        document.getElementById("message").innerHTML =
            `🏆 Puzzle Solved! ${winner.name} wins with ${winner.score} points!`;

    }
}

// Update Scoreboard
function updateScoreBoard(){

    let html = "";

    players.forEach((player,index)=>{

        if(index === currentPlayerIndex){

            html += `
            <div class="scoreCard current">
                👉 ${player.name}: ${player.score}
            </div>`;
        }
        else{

            html += `
            <div class="scoreCard">
                ${player.name}: ${player.score}
            </div>`;
        }

    });

    document.getElementById("playerScores").innerHTML = html;

    document.getElementById("currentPlayer").innerHTML =
        "Current Turn: " + players[currentPlayerIndex].name;
}

// Next Turn
function nextPlayer(){

    currentPlayerIndex++;

    if(currentPlayerIndex >= players.length){
        currentPlayerIndex = 0;
    }

    updateScoreBoard();
}

// Spin Wheel
function spinWheel(){

    const wheel = document.getElementById("wheel");

    let randomRotation =
        Math.floor(Math.random() * 360) + 1440;

    wheel.style.transform =
        `rotate(${randomRotation}deg)`;

    currentSpin =
        wheelValues[Math.floor(Math.random() * wheelValues.length)];

    setTimeout(()=>{

        document.getElementById("spinValue").innerHTML =
            `🎯 Value: ${currentSpin} Points`;

    },4000);
}

// Guess Letter
function guessLetter(){

    let input = document.getElementById("guess");

    let letter =
        input.value.toUpperCase();

    if(letter === "") return;

    if(currentSpin === 0){

        alert("Spin the wheel first!");

        return;
    }

    if(guessedLetters.includes(letter)){

        alert("That letter was already guessed!");

        return;
    }

    guessedLetters.push(letter);

    let matches = 0;

    for(let l of currentWord){

        if(l === letter){
            matches++;
        }

    }

    if(matches > 0){

        players[currentPlayerIndex].score +=
            currentSpin * matches;

        document.getElementById("message").innerHTML =
            `✅ Correct! ${matches} letter(s) found.`;

    }
    else{

        document.getElementById("message").innerHTML =
            "❌ Incorrect! Next player's turn.";

        nextPlayer();
    }

    updateScoreBoard();
    displayPuzzle();

    input.value = "";
}

// Allow Enter key
document.addEventListener("keydown", function(event){

    if(event.key === "Enter"){
        guessLetter();
    }

});

</script>

</body>
</html>
