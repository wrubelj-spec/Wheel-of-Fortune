<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8th Grade Science Wheel of Fortune</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f0f8ff;
    margin:20px;
}

h1{
    color:#0d47a1;
}

#wheel{
    width:280px;
    height:280px;
    border-radius:50%;
    border:8px solid #333;
    margin:20px auto;
    transition:transform 4s ease-out;
    background:
    conic-gradient(
        #4CAF50 0deg 22.5deg,
        #2196F3 22.5deg 45deg,
        #FFC107 45deg 67.5deg,
        #FF5722 67.5deg 90deg,
        #9C27B0 90deg 112.5deg,
        #E91E63 112.5deg 135deg,
        #00BCD4 135deg 157.5deg,
        #8BC34A 157.5deg 180deg,
        #3F51B5 180deg 202.5deg,
        #FF9800 202.5deg 225deg,
        #F44336 225deg 247.5deg,
        #795548 247.5deg 270deg,
        #4CAF50 270deg 292.5deg,
        #2196F3 292.5deg 315deg,
        #FFC107 315deg 337.5deg,
        #FF5722 337.5deg 360deg
    );
}

.pointer{
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid black;
    margin:auto;
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

input{
    padding:10px;
    font-size:18px;
    width:60px;
    text-align:center;
}

select{
    padding:8px;
    font-size:16px;
}

#puzzle{
    font-size:40px;
    letter-spacing:8px;
    margin:25px;
    font-weight:bold;
}

#message{
    font-size:20px;
    min-height:40px;
    margin:15px;
    color:#006400;
}

#spinValue{
    color:#d32f2f;
}

.scoreCard{
    padding:5px;
    font-size:18px;
}

.current{
    font-weight:bold;
    color:#d32f2f;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<h1>🎡 8th Grade Science Wheel of Fortune</h1>

<div id="setupScreen">
    <h3>Select Number of Players</h3>

    <select id="playerCount">
        <option value="1">1 Player</option>
        <option value="2" selected>2 Players</option>
        <option value="3">3 Players</option>
        <option value="4">4 Players</option>
    </select>

    <br><br>

    <button onclick="setupPlayers()">Start Game</button>
</div>

<div id="gameArea" class="hidden">

    <h2 id="currentPlayer"></h2>

    <div id="playerScores"></div>

    <div class="pointer"></div>
    <div id="wheel"></div>

    <button onclick="spinWheel()">🎡 Spin Wheel</button>

    <h2 id="spinValue">Spin to Begin!</h2>

    <div id="puzzle"></div>

    <input type="text" id="guess" maxlength="1" placeholder="A">

    <button onclick="guessLetter()">Guess Letter</button>

    <div id="message"></div>

</div>

<script>

// ==========================
// SCIENCE WORDS
// ==========================
const scienceWords = [
    "PHOTOSYNTHESIS",
    "ATOM",
    "MOLECULE",
    "ECOSYSTEM",
    "GRAVITY",
    "ENERGY",
    "CHEMICAL",
    "REACTION",
    "MITOSIS",
    "ADAPTATION",
    "EVOLUTION",
    "CELL",
    "NUCLEUS",
    "FORCE",
    "MASS",
    "DENSITY",
    "WEATHER",
    "CLIMATE",
    "FOSSIL",
    "GENETICS"
];

// ==========================
// WHEEL SPACES
// ==========================
const wheelValues = [
    "$100",
    "$200",
    "$300",
    "$400",
    "$500",
    "$600",
    "$700",
    "$800",
    "$1000",
    "🍬 CANDY",
    "💥 BANKRUPT",
    "$500",
    "$300",
    "$700",
    "🍬 CANDY",
    "💥 BANKRUPT"
];

let players = [];
let currentPlayerIndex = 0;

let currentWord = "";
let guessedLetters = [];
let currentSpin = null;

// ==========================
// SETUP PLAYERS
// ==========================
function setupPlayers(){

    const count =
        parseInt(document.getElementById("playerCount").value);

    players = [];

    for(let i=1;i<=count;i++){

        players.push({
            name:"Player " + i,
            score:0,
            candy:0
        });
    }

    document.getElementById("setupScreen")
        .classList.add("hidden");

    document.getElementById("gameArea")
        .classList.remove("hidden");

    currentPlayerIndex = 0;

    updateScoreBoard();
    startGame();
}

// ==========================
// START GAME
// ==========================
function startGame(){

    currentWord =
        scienceWords[Math.floor(Math.random()*scienceWords.length)];

    guessedLetters = [];
    currentSpin = null;

    displayPuzzle();
}

// ==========================
// DISPLAY PUZZLE
// ==========================
function displayPuzzle(){

    let display = "";

    for(let letter of currentWord){

        if(guessedLetters.includes(letter)){
            display += letter + " ";
        }
        else{
            display += "_ ";
        }
    }

    document.getElementById("puzzle").innerHTML = display;

    if(!display.includes("_")){

        let winner = players[0];

        players.forEach(player=>{

            if(player.score > winner.score){
                winner = player;
            }

        });

        document.getElementById("message").innerHTML =
        `🏆 GAME OVER!<br>
         Winner: ${winner.name}<br>
         💰 $${winner.score}<br>
         🍬 Candy: ${winner.candy}`;
    }
}

// ==========================
// SCOREBOARD
// ==========================
function updateScoreBoard(){

    let html = "";

    players.forEach((player,index)=>{

        html += `
        <div class="${
            index === currentPlayerIndex
            ? 'scoreCard current'
            : 'scoreCard'
        }">
            ${index===currentPlayerIndex ? '👉 ' : ''}
            ${player.name}
            | 💰 $${player.score}
            | 🍬 ${player.candy}
        </div>`;
    });

    document.getElementById("playerScores").innerHTML =
        html;

    document.getElementById("currentPlayer").innerHTML =
        "Current Turn: " +
        players[currentPlayerIndex].name;
}

// ==========================
// NEXT PLAYER
// ==========================
function nextPlayer(){

    currentPlayerIndex++;

    if(currentPlayerIndex >= players.length){
        currentPlayerIndex = 0;
    }

    updateScoreBoard();
}

// ==========================
// SPIN WHEEL
// ==========================
function spinWheel(){

    const wheel =
        document.getElementById("wheel");

    const rotation =
        Math.floor(Math.random()*360) + 1440;

    wheel.style.transform =
        `rotate(${rotation}deg)`;

    currentSpin =
        wheelValues[Math.floor(Math.random()*wheelValues.length)];

    setTimeout(()=>{

        document.getElementById("spinValue").innerHTML =
            `🎯 ${currentSpin}`;

        // BANKRUPT
        if(currentSpin.includes("BANKRUPT")){

            players[currentPlayerIndex].score = 0;

            document.getElementById("message").innerHTML =
                `💥 BANKRUPT! ${players[currentPlayerIndex].name}
                 loses all money!`;

            updateScoreBoard();

            nextPlayer();
        }

        // CANDY
        else if(currentSpin.includes("CANDY")){

            players[currentPlayerIndex].candy++;

            document.getElementById("message").innerHTML =
                `🍬 Candy won! Guess a letter.`;

            updateScoreBoard();
        }

    },4000);
}

// ==========================
// GUESS LETTER
// ==========================
function guessLetter(){

    let letter =
        document.getElementById("guess")
        .value.toUpperCase();

    if(letter === "") return;

    if(currentSpin === null){

        alert("Spin the wheel first!");

        return;
    }

    if(guessedLetters.includes(letter)){

        alert("Letter already guessed.");

        return;
    }

    guessedLetters.push(letter);

    let matches = 0;

    for(let l of currentWord){

        if(l === letter){
            matches++;
        }
    }

    if(matches > 0){

        if(typeof currentSpin === "string" &&
           currentSpin.startsWith("$")){

            let value =
                parseInt(currentSpin.replace("$",""));

            players[currentPlayerIndex].score +=
                value * matches;
        }

        document.getElementById("message").innerHTML =
            `✅ Correct! ${matches} letter(s) found.`;
    }
    else{

        document.getElementById("message").innerHTML =
            "❌ Incorrect! Next player's turn.";

        nextPlayer();
    }

    updateScoreBoard();
    displayPuzzle();

    document.getElementById("guess").value = "";

    currentSpin = null;
    document.getElementById("spinValue").innerHTML =
        "Spin Again";
}

// ==========================
// ENTER KEY SUPPORT
// ==========================
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        guessLetter();
    }

});

</script>

</body>
</html>
